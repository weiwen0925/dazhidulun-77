<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);line-height:1.8;font-size:17px;
  -webkit-user-drag:none;
}
img{-webkit-user-drag:none;pointer-events:none;}
a{color:inherit;text-decoration:none;}

/* === sidebar === */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 4px;cursor:pointer;text-decoration:none;color:var(--sbText);width:100%;transition:all .25s;}
.sb-item:hover{color:var(--goldL);}
.sb-circle{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(184,134,11,.5);display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:14px;font-weight:600;color:var(--gold);transition:all .3s;background:rgba(0,0,0,.2);}
.sb-item.active .sb-circle,.sb-item:hover .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);box-shadow:0 0 14px rgba(212,168,75,.6);}
.sb-label{font-size:10.5px;letter-spacing:1.2px;text-align:center;line-height:1.3;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;width:42px;height:42px;border:0;background:var(--sbBg);color:var(--gold);font-size:22px;border-radius:8px;cursor:pointer;z-index:120;}

/* === main === */
.main{margin-left:var(--sbW);min-height:100vh;}

/* === hero === */
.site-hero{background:linear-gradient(180deg,#241d14 0%,#1a1410 100%);color:#fff;padding:84px 32px 70px;text-align:center;position:relative;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;font-size:340px;color:rgba(212,168,75,.04);left:50%;top:50%;transform:translate(-50%,-50%);font-weight:900;letter-spacing:30px;pointer-events:none;}
.site-hero::after{content:"卷七十七";position:absolute;font-size:120px;color:rgba(184,134,11,.045);right:6%;bottom:6%;font-weight:900;letter-spacing:18px;pointer-events:none;}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:5px;color:var(--goldL);opacity:.85;margin-bottom:14px;position:relative;z-index:1;}
.hero-super{font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:9px;color:var(--goldL);opacity:.85;margin-bottom:10px;position:relative;z-index:1;}
.hero-title{font-size:48px;font-weight:900;margin-bottom:18px;letter-spacing:14px;color:#fff;position:relative;z-index:1;}
.hero-sub{font-size:18px;font-family:"Noto Serif TC",serif;color:#f3e7c4;letter-spacing:4px;margin-bottom:14px;position:relative;z-index:1;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:14px;color:var(--gold);letter-spacing:3px;position:relative;z-index:1;}

/* === preface === */
.preface{max-width:880px;margin:54px auto 28px;padding:0 32px;}
.preface-title{font-family:"Noto Serif TC",serif;font-size:26px;color:var(--accent);text-align:center;letter-spacing:6px;margin-bottom:24px;position:relative;}
.preface-title::after{content:"";display:block;width:64px;height:2px;background:var(--gold);margin:14px auto 0;}
.preface p{margin-bottom:16px;line-height:2;color:var(--text2);font-size:16px;text-indent:2em;text-align:justify;}

/* === toc === */
.toc-section{max-width:1100px;margin:24px auto 36px;padding:0 32px;}
.toc-title{font-family:"Noto Serif TC",serif;font-size:30px;color:var(--accent);text-align:center;letter-spacing:8px;margin-bottom:8px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:13px;color:var(--text-muted);letter-spacing:3px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:all .25s;cursor:pointer;text-decoration:none;color:inherit;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.15);border-color:var(--gold);}
.toc-num{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;flex-shrink:0;box-shadow:0 2px 6px rgba(184,134,11,.4);}
.toc-name{font-family:"Noto Serif TC",serif;font-size:16px;color:var(--accent);line-height:1.55;font-weight:600;}
.toc-name small{display:block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;color:var(--text-muted);letter-spacing:1.5px;margin-top:4px;font-weight:400;}

/* === chapter === */
.chapter{max-width:1100px;margin:64px auto 0;padding:0 24px;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;padding:36px 32px;border-radius:14px 14px 0 0;text-align:center;position:relative;}
.ch-head::after{content:"";position:absolute;left:50%;bottom:-1px;transform:translateX(-50%);width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:6px;color:var(--goldL);opacity:.85;margin-bottom:10px;}
.ch-name{font-family:"Noto Serif TC",serif;font-size:30px;font-weight:700;letter-spacing:6px;color:#fff;margin-bottom:8px;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:3px;color:var(--gold-light);opacity:.9;}
.ch-body{background:var(--bg);padding:30px 24px 16px;border:1px solid var(--border);border-top:0;border-radius:0 0 14px 14px;}

/* === bridge === */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;text-align:justify;}

/* === iframe === */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

/* === next link === */
.next-link{display:inline-block;margin:18px 0 8px;padding:10px 22px;background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;border-radius:24px;font-family:"Noto Sans TC",sans-serif;font-size:13.5px;letter-spacing:2px;text-decoration:none;transition:all .25s;box-shadow:0 3px 10px rgba(184,134,11,.3);}
.next-link:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(184,134,11,.45);}

/* === read progress === */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

/* === back top === */
#backTop{position:fixed;right:22px;bottom:80px;width:44px;height:44px;border-radius:50%;border:0;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;display:none;z-index:110;box-shadow:0 4px 14px rgba(91,58,41,.35);transition:all .25s;}
#backTop:hover{background:var(--gold);transform:translateY(-2px);}
#backTop.show{display:block;}

/* === footer === */
.site-footer{margin:80px 24px 60px;padding:30px 0 0;text-align:center;border-top:1px solid var(--border);color:var(--text-muted);font-family:"Noto Sans TC",sans-serif;font-size:13.5px;letter-spacing:3px;}

/* === responsive === */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.show{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .site-hero{padding:64px 18px 50px;}
  .hero-title{font-size:34px;letter-spacing:8px;}
  .preface,.toc-section{padding:0 18px;}
  .chapter{padding:0 12px;}
  .ch-head{padding:24px 16px;}
  .ch-name{font-size:24px;letter-spacing:4px;}
}

:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:&quot;Noto Serif TC&quot;,&quot;Source Han Serif TC&quot;,&quot;Songti TC&quot;,Georgia,serif;
  background:var(--bg);color:var(--text);line-height:1.8;font-size:20px;
  -webkit-user-drag:none;
}
img{-webkit-user-drag:none;pointer-events:none;}
a{color:inherit;text-decoration:none;}

/* ==== Sidebar ==== */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding:0 4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 4px;border-radius:8px;cursor:pointer;
  transition:background .25s;width:64px;text-align:center;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  background:rgba(212,196,168,.1);border:1.5px solid rgba(184,134,11,.4);
  color:var(--gold);display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:15px;font-weight:700;
  transition:all .25s;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  box-shadow:0 0 18px rgba(184,134,11,.55);border-color:var(--goldL);}
.sb-label{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11.5px;
  color:var(--sbText);opacity:.85;letter-spacing:1px;line-height:1.3;}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;}

#sbToggle{display:none;}

/* ==== Main ==== */
.main{margin-left:var(--sbW);padding:0;}

/* ==== Hero ==== */
.site-hero{position:relative;padding:80px 40px 60px;text-align:center;
  background:linear-gradient(135deg,#1e1a14 0%,#2a2218 50%,#1e1a14 100%);
  color:#f7f3ec;overflow:hidden;}
.site-hero::before{content:&quot;般若&quot;;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:380px;font-weight:900;
  color:rgba(212,168,75,.04);font-family:&quot;Noto Serif TC&quot;,serif;
  letter-spacing:30px;pointer-events:none;}
.hero-content{position:relative;z-index:1;max-width:900px;margin:0 auto;}
.hero-eyebrow{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;
  letter-spacing:6px;color:var(--goldL);margin-bottom:18px;text-transform:uppercase;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;
  color:#f7f3ec;margin-bottom:18px;line-height:1.3;}
.hero-subtitle{font-size:20px;font-weight:400;letter-spacing:5px;
  color:var(--goldL);margin-bottom:28px;line-height:1.6;}
.hero-meta{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;
  color:#d4c4a8;letter-spacing:2px;line-height:1.8;opacity:.85;}
.hero-meta strong{color:var(--goldL);font-weight:600;}
.hero-range{display:inline-block;margin-top:20px;padding:8px 24px;
  border:1px solid rgba(184,134,11,.5);border-radius:24px;
  font-size:17px;letter-spacing:3px;color:var(--goldL);}
.hero-skt{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-style:italic;
  font-size:15px;color:rgba(212,196,168,.6);margin-top:14px;letter-spacing:1px;}

/* ==== Preface ==== */
.preface{max-width:880px;margin:50px auto 30px;padding:0 40px;}
.preface-title{font-family:&quot;Noto Serif TC&quot;,serif;font-size:30px;
  text-align:center;color:var(--accent);margin-bottom:24px;letter-spacing:6px;
  border-bottom:1px solid var(--border);padding-bottom:14px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin-bottom:14px;text-align:justify;}
.preface p strong{color:var(--accent-red);font-weight:700;}

/* ==== TOC ==== */
.toc-section{max-width:1100px;margin:50px auto 60px;padding:0 40px;}
.toc-title{font-family:&quot;Noto Serif TC&quot;,serif;font-size:34px;
  text-align:center;color:var(--accent);margin-bottom:14px;letter-spacing:14px;}
.toc-desc{text-align:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:17px;color:var(--text-muted);letter-spacing:3px;
  margin-bottom:36px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;}
.toc-card{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer;}
.toc-card:hover{transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(91,58,41,.15);border-color:var(--gold);}
.toc-num{flex:0 0 38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;font-weight:700;}
.toc-name{flex:1;font-size:19.5px;line-height:1.7;color:var(--text);font-weight:500;}
.toc-name small{display:block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;
  color:var(--text-muted);margin-top:4px;letter-spacing:1px;font-weight:400;}

/* ==== Chapter ==== */
.chapter{margin:32px 0;}
.ch-head{padding:62px 40px 56px;text-align:center;background:var(--headGrad);color:#f7f3ec;position:relative;}
.ch-head::after{content:&quot;&quot;;display:block;width:64px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:18px auto 0;}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;
  letter-spacing:5px;color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:34px;font-weight:700;letter-spacing:5px;color:#f7f3ec;margin-bottom:12px;line-height:1.4;}
.ch-sub{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17px;
  color:#d4c4a8;letter-spacing:2.5px;line-height:1.7;opacity:.9;}
.ch-body{max-width:980px;margin:0 auto;padding:46px 40px 40px;
  background:var(--bg);}

/* Bridges */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0 0 8px;color:var(--text2);line-height:2.1;font-size:18.5px;}
.bridge p:last-child{margin-bottom:0;}
.bridge p strong{color:var(--accent-red);}

/* Section */
.section-block{margin:34px 0 26px;}
h2{font-size:30px;font-weight:700;color:var(--accent);
  border-left:4px solid var(--gold);padding:10px 0 10px 20px;
  margin:32px 0 18px;letter-spacing:2.5px;line-height:1.5;
  background:linear-gradient(90deg,rgba(248,238,217,.55),transparent);}
h3{font-size:23.5px;font-weight:600;color:var(--text);margin:24px 0 12px;
  padding-bottom:6px;border-bottom:1px solid var(--border-light);letter-spacing:1.6px;}
h4{font-size:20px;font-weight:600;color:var(--text2);margin:18px 0 10px;}
h5{font-size:18.5px;font-weight:700;color:var(--gold);margin:14px 0 8px;letter-spacing:1.5px;}

p{margin:0 0 12px;font-size:20px;line-height:1.9;color:var(--text);text-align:justify;}
p strong,p b{color:var(--accent-red);font-weight:700;}
em{font-style:normal;color:var(--accent);}

ul,ol{margin:10px 0 14px;padding-left:28px;}
li{font-size:20px;line-height:1.9;margin-bottom:6px;}

/* Verse / blockquote */
.verse,blockquote,.classical-text{
  background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:18px 26px;margin:18px 0;line-height:2.0;
  white-space:normal;border-radius:0 6px 6px 0;
  font-size:22px;color:var(--text);
}
.verse{text-align:center;font-style:normal;}
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-left:4px solid var(--gold);border-radius:10px;}

.text-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;
  background:#1e1a14;color:#d4a84b;padding:3px 12px;border-radius:6px;
  letter-spacing:2.5px;margin-bottom:12px;}

/* Cards */
.card,.insight,.commentary,.metaphor,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 24px;margin:16px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.08);}
.card-title{font-size:21.5px;color:var(--accent);font-weight:700;margin-bottom:8px;letter-spacing:1.5px;}
.card-content,.card-desc{font-size:20px;line-height:1.9;color:var(--text2);}
.insight{border-left:4px solid var(--gold);}
.insight-title{font-size:21.5px;color:var(--accent-red);font-weight:700;margin-bottom:8px;}

/* Q&amp;A */
.qa{margin:18px 0;}
.qa .q{padding:12px 18px;background:#e8eef5;border-left:4px solid #4a6b8a;
  border-radius:0 6px 6px 0;margin-bottom:10px;color:#2c3e50;font-size:20px;line-height:1.9;}
.qa .a{padding:12px 18px;background:#fffdf5;border-left:4px solid var(--accent);
  border-radius:0 6px 6px 0;color:var(--text);font-size:20px;line-height:1.9;}
.qa-3{padding-left:3em;}
.qa-2{padding-left:2em;}

/* Flow charts */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:20px 0;padding:18px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;}
.flow-box,.flow-step{padding:12px 20px;background:#fffdf5;
  border:1.5px solid var(--gold);border-radius:8px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:17.5px;font-weight:600;
  color:var(--text);min-width:140px;text-align:center;}
.flow-box small,.flow-step small{display:block;font-weight:400;font-size:13px;
  color:var(--text-muted);margin-top:4px;letter-spacing:1px;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:300;}
.flow.flow-v,.flow.flow-vertical{flex-direction:column;}
.flow.flow-v .flow-arrow,.flow.flow-vertical .flow-arrow{transform:rotate(0);}

/* Grid layouts */
.four-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;}
.four-grid .cell{padding:18px 22px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;font-size:19px;line-height:1.85;}
.four-grid .cell h5{margin-top:0;color:var(--gold);font-size:17px;letter-spacing:2px;}

.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:20px 0;}
.three-col .col{padding:18px 22px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;font-size:19px;line-height:1.85;}
.three-col .col h5{margin:0 0 8px;color:var(--gold);font-size:17px;letter-spacing:2px;border-bottom:1px solid var(--border-light);padding-bottom:6px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;}
.two-col .col{padding:18px 22px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;font-size:19px;line-height:1.85;}
.two-col .col h5{margin:0 0 8px;color:var(--gold);font-size:17px;letter-spacing:2px;border-bottom:1px solid var(--border-light);padding-bottom:6px;}

/* Spectrum */
.spectrum{display:flex;align-items:center;justify-content:space-between;
  gap:14px;margin:24px 0;padding:24px 18px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;position:relative;}
.spectrum::before{content:&quot;&quot;;position:absolute;top:50%;left:8%;right:8%;height:2px;
  background:linear-gradient(90deg,var(--accentL),var(--gold),var(--accentL));z-index:0;}
.sp-node{position:relative;z-index:1;background:var(--card);padding:10px 18px;
  border-radius:24px;border:1.5px solid var(--gold);font-family:&quot;Noto Sans TC&quot;,sans-serif;
  font-size:15.5px;font-weight:600;color:var(--text);text-align:center;min-width:120px;}
.sp-mid{background:linear-gradient(135deg,var(--gold),var(--goldL));border-color:var(--goldL);}
.sp-mid,.sp-mid *{color:#fff;}
.sp-mid h5{color:#fff;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small{color:rgba(255,255,255,.92);}

/* Refutation grid */
.refutation-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0;}
.ref-cell{position:relative;padding:24px 22px 20px;background:var(--card);
  border:1.5px solid var(--border);border-radius:8px;font-size:17.5px;line-height:1.8;}
.ref-cell::before{content:&quot;✘&quot;;position:absolute;top:8px;right:14px;font-size:38px;
  color:rgba(139,37,0,.18);font-weight:900;line-height:1;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ref-cell h5{margin:0 0 8px;font-size:18px;color:var(--accent);letter-spacing:1.5px;}

/* Triangle diagram */
.triangle-diagram{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;
  margin:24px 0;padding:18px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.tri-node{padding:14px 18px;background:#fffdf5;border:1.5px solid var(--gold);
  border-radius:8px;text-align:center;font-size:17px;line-height:1.7;}
.tri-node h5{margin:0 0 4px;color:var(--accent);font-size:17px;letter-spacing:1.5px;}
.tri-conclusion{grid-column:1 / span 3;padding:14px 22px;text-align:center;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  border-radius:8px;font-size:18px;font-weight:600;letter-spacing:2px;margin-top:6px;}

/* Big quote */
.big-quote{font-size:24px;font-weight:600;text-align:center;color:var(--accent);
  padding:28px 24px;margin:26px 0;background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-radius:12px;
  font-family:&quot;Noto Serif TC&quot;,serif;letter-spacing:3px;line-height:1.7;}
.big-quote small{display:block;margin-top:10px;font-size:15px;
  color:var(--text-muted);font-weight:400;letter-spacing:1.5px;}

/* Domino chain */
.domino-chain{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:18px 0;padding:18px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;}
.domino{padding:10px 16px;background:#fffdf5;border:1.5px solid var(--gold);
  border-radius:6px;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:16px;font-weight:600;
  color:var(--text);min-width:120px;text-align:center;}
.chain-arrow{color:var(--gold);font-size:20px;}

/* Phase badge */
.phase-badge{display:inline-block;padding:6px 18px;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#fff;
  border-radius:20px;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;
  letter-spacing:3px;font-weight:600;margin-bottom:12px;}

/* HR */
hr{border:none;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  margin:24px 0;}

/* Read progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* Back to top */
#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;
  border-radius:50%;background:var(--gold);color:#1e1a14;border:none;
  font-size:22px;font-weight:700;cursor:pointer;display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:110;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;}
#backTop:hover{background:var(--goldL);}
#backTop.show{display:block;}

/* Footer */
.site-footer{padding:40px 24px 70px;text-align:center;
  background:linear-gradient(180deg,transparent,rgba(212,196,168,.2));
  font-family:&quot;Noto Sans TC&quot;,sans-serif;color:var(--text-muted);
  font-size:15px;letter-spacing:2px;line-height:1.9;}
.site-footer p{font-size:15px;color:var(--text-muted);margin-bottom:6px;}

/* Responsive */
@media(max-width:900px){
  #sb{display:none;}
  .main{margin-left:0;}
  #sbToggle{display:flex;position:fixed;top:14px;left:14px;width:44px;height:44px;
    background:var(--sbBg);color:var(--gold);border:none;border-radius:8px;
    font-size:22px;cursor:pointer;z-index:101;align-items:center;justify-content:center;}
  .site-hero{padding:50px 24px 40px;}
  .hero-title{font-size:38px;letter-spacing:5px;}
  .hero-subtitle{font-size:16px;letter-spacing:3px;}
  .ch-head{padding:42px 24px 36px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .ch-body{padding:30px 22px;}
  .four-grid,.three-col,.two-col,.refutation-grid,.triangle-diagram{grid-template-columns:1fr;}
  .toc-grid{grid-template-columns:1fr;}
  .preface,.toc-section{padding:0 22px;}
}
@media(max-width:600px){
  body{font-size:18px;}
  h2{font-size:24px;}
  h3{font-size:20px;}
  p,li{font-size:18px;}
  .verse,.classical-text{font-size:19px;padding:14px 18px;}
}

(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart','mousedown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      if(ev==='mousedown' &amp;&amp; e.button!==2) return;
      blk(e);
    },true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&amp;&amp;(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&amp;&amp;e.shiftKey&amp;&amp;(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);
})();

(function(){
  if(!window.frameElement) return;
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&amp;&amp;a.tagName!=='A') a=a.parentElement;
    if(!a) return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#') return;
    e.preventDefault();
    e.stopPropagation();
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el) return;
    try{
      var rect=el.getBoundingClientRect();
      var fr=window.frameElement;
      var frRect=fr.getBoundingClientRect();
      var targetY=window.parent.scrollY+frRect.top+rect.top-60;
      window.parent.scrollTo({top:targetY,behavior:'smooth'});
    }catch(ex){}
  },true);
})();

(function(){
  var KEY = 'WeiYuanL5_2026';
  function dec(b64){
    try{
      var bin = atob(b64), out='';
      for(var i=0;i&lt;bin.length;i++) out += String.fromCharCode(bin.charCodeAt(i)^KEY.charCodeAt(i%KEY.length));
      return decodeURIComponent(escape(out));
    }catch(e){return'';}
  }
  function decodeAll(){
    var els = document.querySelectorAll('span.wy-c[data-c]');
    for(var i=0;i&lt;els.length;i++){
      var el = els[i];
      el.textContent = dec(el.getAttribute('data-c'));
      el.removeAttribute('data-c');
      el.classList.add('wy-decoded');
    }
  }
  function go(){
    try{
      if(window.parent &amp;&amp; window.parent.__wyReady &amp;&amp; typeof window.parent.__wyReady.then === 'function'){
        window.parent.__wyReady.then(decodeAll, function(){});

      }
    }catch(e){}
    decodeAll();
  }
  if(document.readyState === 'loading'){

  } else {
    go();

})();

  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;width:0;height:0;}
body{font-family:&quot;Noto Serif TC&quot;,&quot;Source Han Serif TC&quot;,&quot;Songti TC&quot;,Georgia,serif;background:var(--bg);color:var(--text);line-height:1.8;font-size:17px;}

a{color:var(--accent);text-decoration:none;}
a:hover{color:var(--gold);}

#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;padding:0 0 16px;overflow-y:auto;}
.sb-brand{position:sticky;top:0;width:100%;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;letter-spacing:2px;color:var(--gold);text-align:center;line-height:1.5;background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:3px 4px;cursor:pointer;text-decoration:none;color:var(--sbText);width:100%;transition:all .25s;}
.sb-item:hover{color:var(--goldL);}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(184,134,11,.5);display:flex;align-items:center;justify-content:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;font-weight:600;color:var(--gold);transition:all .3s;background:rgba(0,0,0,.2);}
.sb-item.active .sb-circle,.sb-item:hover .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);box-shadow:0 0 14px rgba(212,168,75,.6);}
.sb-label{font-size:10px;letter-spacing:1px;text-align:center;line-height:1.3;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;width:42px;height:42px;border:0;background:var(--sbBg);color:var(--gold);font-size:22px;border-radius:8px;cursor:pointer;z-index:120;}

.main{margin-left:var(--sbW);min-height:100vh;}
.site-hero{background:linear-gradient(180deg,#241d14 0%,#1a1410 100%);color:#fff;padding:84px 32px 70px;text-align:center;position:relative;overflow:hidden;}
.site-hero::before{content:&quot;般若&quot;;position:absolute;font-size:340px;color:rgba(212,168,75,.04);left:50%;top:50%;transform:translate(-50%,-50%);font-weight:900;letter-spacing:30px;pointer-events:none;}
.site-hero::after{content:&quot;金剛&quot;;position:absolute;font-size:140px;color:rgba(184,134,11,.045);right:8%;bottom:6%;font-weight:900;letter-spacing:14px;pointer-events:none;}
.hero-meta{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:5px;color:var(--goldL);opacity:.85;margin-bottom:14px;position:relative;z-index:1;}
.hero-title{font-size:48px;font-weight:900;margin-bottom:16px;letter-spacing:6px;color:#fff;position:relative;z-index:1;}
.hero-subtitle{font-size:18px;font-family:&quot;Noto Sans TC&quot;,sans-serif;color:var(--goldL);letter-spacing:3px;margin-bottom:10px;position:relative;z-index:1;}
.hero-sub{font-size:16px;color:rgba(255,255,255,.78);font-style:italic;position:relative;z-index:1;letter-spacing:1px;}
.hero-range{margin-top:18px;display:inline-block;padding:6px 22px;border:1px solid rgba(212,168,75,.45);border-radius:30px;font-size:14px;color:var(--goldL);letter-spacing:3px;font-family:&quot;Noto Sans TC&quot;,sans-serif;position:relative;z-index:1;}

.preface{max-width:880px;margin:46px auto 30px;padding:0 28px;}
.preface h2{font-size:26px;color:var(--accent);text-align:center;margin-bottom:20px;letter-spacing:3px;font-weight:700;}
.preface p{margin:0 0 14px;color:var(--text);line-height:2;font-size:16.5px;text-align:justify;}
.preface p strong,.preface p b{color:var(--accent-red);}

.toc-section{max-width:1100px;margin:34px auto 26px;padding:0 28px;}
.toc-title{font-size:30px;color:var(--accent);text-align:center;margin-bottom:8px;letter-spacing:5px;font-weight:700;}
.toc-desc{text-align:center;color:var(--text-muted);font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:3px;margin-bottom:24px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.toc-card{display:flex;align-items:flex-start;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-decoration:none;color:var(--text);transition:all .25s;}
.toc-card:hover{border-color:var(--gold);box-shadow:0 4px 18px rgba(184,134,11,.15);transform:translateY(-2px);}
.toc-num{flex:0 0 auto;width:38px;height:38px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:700;font-size:14px;}
.toc-name{flex:1;font-size:16px;line-height:1.6;color:var(--text);font-weight:500;}

.chapter{padding:24px 0;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;padding:42px 28px 38px;margin:18px 0 0;border-bottom:2px solid var(--gold);position:relative;}
.ch-head::after{content:&quot;&quot;;position:absolute;left:50%;bottom:-2px;width:80px;height:2px;background:var(--goldL);transform:translateX(-50%);box-shadow:0 0 14px var(--goldL);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:5px;color:var(--goldL);margin-bottom:10px;}
.ch-name{font-size:30px;font-weight:700;letter-spacing:4px;margin-bottom:10px;color:#fff;}
.ch-sub{font-size:14px;color:rgba(255,255,255,.78);letter-spacing:2px;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 18px;background:var(--bg);}
.ch-body h2{font-size:24px;color:var(--accent);margin:30px 0 14px;padding:8px 0 8px 18px;border-left:4px solid var(--gold);background:linear-gradient(90deg,rgba(184,134,11,.08),transparent);font-weight:700;letter-spacing:1.5px;}
.ch-body h3{font-size:19px;color:var(--text);margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-light);font-weight:600;}
.ch-body h4{font-size:17px;color:var(--text2);margin:18px 0 8px;font-weight:600;}
.ch-body h5{font-size:16px;color:var(--accent);margin:0 0 8px;font-weight:700;letter-spacing:1px;}
.ch-body p{margin:0 0 12px;line-height:2;color:var(--text);font-size:17px;text-align:justify;}
.ch-body p b,.ch-body p strong{color:var(--accent-red);font-weight:700;}
.ch-body ul,.ch-body ol{margin:0 0 12px 24px;line-height:1.95;}
.ch-body ul li{margin-bottom:6px;}

.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:11px;background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;}

.verse,.gatha,blockquote{background:var(--verseBg);border-left:4px solid var(--verseBd);padding:14px 22px;line-height:2.0;text-align:center;font-style:normal;border-radius:0 8px 8px 0;margin:16px 0;font-size:18px;}
.verse small{display:block;margin-top:8px;color:var(--text-muted);font-size:13.5px;line-height:1.7;}

.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;padding:18px 24px;line-height:1.95;margin:18px 0;}
.text-label{display:inline-block;background:#2C1810;color:#fff;padding:3px 14px;border-radius:14px;font-size:13px;letter-spacing:3px;margin-bottom:14px;font-family:&quot;Noto Sans TC&quot;,sans-serif;font-weight:600;}
.classical-text p{margin:0 0 12px;line-height:2;font-size:16.5px;color:var(--text);}
.classical-text p:last-child{margin-bottom:0;}
.qa-q{padding-left:1.6em;color:#2c5282;}
.qa-a{padding-left:1.6em;color:var(--accent-red);}

.card,.insight,.commentary,.metaphor{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 22px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.insight{border-left:4px solid var(--gold);}
.commentary{border-left:4px solid var(--accent);}
.metaphor{border-left:4px solid var(--accentL);background:linear-gradient(135deg,#fffdf5,#f8f1e0);}

.four-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:14px 0;}
.four-grid .cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 20px;}
.four-grid .cell h5{margin-bottom:8px;}
.four-grid .cell p{font-size:15.5px;line-height:1.85;margin:0;color:var(--text2);}
.four-grid .cell p+p{margin-top:8px;}
.four-grid .cell ul{margin-left:20px;font-size:15px;line-height:1.85;}

.two-col{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:14px 0;}
.col-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 22px;border-top:3px solid var(--gold);}
.col-card h5{margin-bottom:10px;color:var(--accent);}
.col-card p{font-size:15.5px;line-height:1.9;color:var(--text2);}

.grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0;}
.grid-4 .cell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;}
.grid-4 .cell .num{display:inline-block;background:var(--gold);color:#fff;padding:2px 10px;border-radius:10px;font-size:12px;letter-spacing:1.5px;font-family:&quot;Noto Sans TC&quot;,sans-serif;margin-bottom:6px;}
.grid-4 .cell .term{font-weight:700;color:var(--accent);font-size:16px;margin-bottom:4px;}
.grid-4 .cell .desc{font-size:14.5px;line-height:1.8;color:var(--text2);}

.flow{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:14px 0;justify-content:center;}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{background:var(--card);border:1.5px solid var(--gold);border-radius:8px;padding:12px 18px;min-width:240px;max-width:680px;text-align:center;font-size:15.5px;line-height:1.7;color:var(--text);}
.flow-box b{color:var(--accent-red);}
.flow-box small{display:block;font-size:13.5px;color:var(--text-muted);margin-top:4px;line-height:1.6;}
.flow-step small{display:block;font-size:13.5px;color:var(--text-muted);margin-top:4px;}
.flow-arrow{font-size:22px;color:var(--gold);font-weight:700;}

.qa{display:grid;grid-template-columns:1fr;gap:8px;margin:14px 0;}
.qa .q,.qa .a{padding:12px 18px;border-radius:8px;line-height:1.9;font-size:16px;}
.qa .q{background:#eaf2fa;border-left:4px solid #4a76a8;color:#2c5282;}
.qa .a{background:#fdf5e8;border-left:4px solid var(--gold);color:var(--text);}

.triangle-diagram{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0;}
.triangle-diagram .tri-node{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:8px;padding:14px 18px;text-align:center;}
.triangle-diagram .tri-node h5{color:var(--accent);font-size:16px;margin-bottom:6px;}
.triangle-diagram .tri-node p{font-size:14.5px;line-height:1.8;color:var(--text2);}
.triangle-diagram .tri-conclusion{grid-column:1/-1;background:linear-gradient(135deg,#fdf8e8,#f5e8c8);border:1px solid var(--gold);border-radius:8px;padding:12px 18px;text-align:center;font-size:15.5px;color:var(--text);line-height:1.85;}
.triangle-diagram .tri-conclusion b{color:var(--accent-red);}

.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;background:rgba(30,26,20,.92);color:var(--gold);padding:8px 22px;border-radius:30px;border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13px;letter-spacing:2px;display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);}
.read-progress .rp-bar{width:140px;height:3px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;}
.read-progress .rp-label{font-size:11px;opacity:.75;letter-spacing:3px;}

#backTop{position:fixed;right:22px;bottom:60px;width:44px;height:44px;border-radius:50%;border:0;background:var(--gold);color:#fff;font-size:22px;cursor:pointer;display:none;z-index:110;box-shadow:0 4px 14px rgba(0,0,0,.18);}
#backTop.show{display:block;}

.site-footer{margin-top:30px;padding:30px 28px 80px;text-align:center;background:#241d14;color:rgba(212,196,168,.78);font-size:13.5px;letter-spacing:1.5px;line-height:1.9;}
.site-footer p{margin-bottom:6px;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;}
  .four-grid,.two-col,.grid-4,.triangle-diagram{grid-template-columns:1fr;}
  .hero-title{font-size:34px;letter-spacing:4px;}
}

/* Venn 圓 */
.venn-wrap{min-height:240px!important;gap:0!important;}

  background:rgba(184,134,11,.08);}
.toc-name{font-size:19.5px;line-height:1.7;font-weight:600;color:var(--text);}
.toc-name small{display:block;font-size:14px;color:var(--text-muted);
  font-weight:400;margin-top:3px;letter-spacing:1px;}

/* chapter */
.chapter{margin:48px auto;max-width:1100px;}
.ch-head{background:var(--headGrad);color:#fff;text-align:center;
  padding:46px 32px 38px;border-radius:14px 14px 0 0;border-bottom:3px solid var(--gold);}
.ch-num{font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;letter-spacing:6px;
  color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:34px;font-weight:900;color:#f5e4b3;letter-spacing:5px;margin-bottom:10px;}
.ch-sub{font-size:17px;color:rgba(245,228,179,.82);letter-spacing:3px;font-family:&quot;Noto Sans TC&quot;,sans-serif;}
.ch-body{background:var(--card);border:1px solid var(--border);border-top:0;
  border-radius:0 0 14px 14px;padding:38px 44px;max-width:980px;margin:0 auto;
  box-shadow:0 4px 20px var(--shadow);}
.ch-body p{font-size:20px;line-height:1.95;margin-bottom:14px;color:var(--text);}
.ch-body p.qa-2{padding-left:2em;}
.ch-body p.qa-3{padding-left:3em;}

/* h2 (節) */
h2{font-size:30px;color:var(--accent);font-weight:700;margin:36px 0 18px;
  padding:10px 0 10px 20px;border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.07),transparent 70%);
  letter-spacing:2px;}
h3{font-size:23.5px;color:var(--text);font-weight:700;margin:26px 0 12px;
  padding-bottom:8px;border-bottom:1px solid var(--border-light);letter-spacing:1px;}
h4{font-size:20px;color:var(--accent);font-weight:600;margin:18px 0 10px;}
h5{font-size:18.5px;color:var(--gold);font-weight:600;margin:12px 0 8px;}

/* 卡片 */
.card,.insight,.commentary,.note,.metaphor{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:18px 24px;margin:18px 0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.insight{border-left:4px solid var(--gold);background:#fffdf5;}
.commentary{border-left:4px solid var(--accentL);}
.metaphor{background:linear-gradient(135deg,#fef9ec,#f7eed3);border-color:var(--accentL);}
.note{border-left:4px solid var(--accent);background:#fdfaf3;}
.card-title,.insight-title{font-size:21.5px;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:1.5px;}
.card-content,.insight-content,.note p,.metaphor p,.commentary p{font-size:20px;line-height:1.95;color:var(--text2);}

/* 經文原典 */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;border-radius:10px;
  padding:22px 28px;margin:18px 0;line-height:2;}
.classical-text p{font-size:21px;line-height:2;text-indent:2em;color:var(--text);margin-bottom:12px;}
.classical-text p:last-child{margin-bottom:0;}
.text-label{display:inline-block;background:var(--accent);color:#fff;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:13.5px;
  padding:4px 14px;border-radius:14px;letter-spacing:3px;margin-bottom:12px;}

/* 偈頌 */
.verse,.gatha,blockquote{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:18px 26px;margin:18px 0;line-height:2.2;
  white-space:normal;text-align:center;font-style:normal;font-size:22px;color:var(--text);
  border-radius:0 8px 8px 0;}
blockquote{font-style:italic;}

/* 問答 */
.qa{margin:20px 0;}
.qa .q{padding:14px 20px;background:rgba(70,120,180,.08);
  border-left:4px solid #4678b4;color:#2a4a78;border-radius:0 6px 6px 0;
  font-size:20px;line-height:1.95;}
.qa .a{padding:14px 20px;background:rgba(139,94,60,.06);
  border-left:4px solid var(--accent);color:var(--text);border-radius:0 6px 6px 0;
  margin-top:6px;font-size:20px;line-height:1.95;}

/* 流程 */
.flow{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin:20px 0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{padding:14px 22px;background:#fff;border:1.5px solid var(--gold);
  border-radius:8px;color:var(--accent);font-weight:600;font-size:17.5px;
  min-width:140px;text-align:center;line-height:1.6;}
.flow-step small,.flow-box small{display:block;font-size:13.5px;color:var(--text-muted);font-weight:400;margin-top:4px;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:700;}
.flow.flow-v .flow-arrow{font-size:26px;}

/* 格線 */
.four-grid,.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:20px 0;}
.col-card,.col,.cell{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 22px;}
.col-title{font-size:21.5px;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:1.2px;}
.col-content{font-size:20px;line-height:1.85;color:var(--text2);}

/* compare table */
.compare-table{width:100%;border-collapse:collapse;margin:20px 0;
  background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.compare-table th{background:var(--accent);color:#fff;padding:14px 18px;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:18px;letter-spacing:2px;text-align:center;}
.compare-table td{padding:14px 20px;border-top:1px solid var(--border-light);
  font-size:19px;line-height:1.85;vertical-align:top;}
.compare-table td:first-child{background:#fef9ec;font-weight:600;color:var(--accent);text-align:center;width:30%;}

/* 三角圖 */
.triangle-diagram{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:22px 0;}
.tri-node{padding:18px 20px;background:linear-gradient(135deg,#fffdf7,#f7ecd2);
  border:1.5px solid var(--accentL);border-radius:10px;text-align:center;font-size:17px;line-height:1.6;}
.tri-node h5{margin-bottom:6px;color:var(--accent);font-size:18.5px;}

/* spectrum */
.spectrum{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:stretch;
  margin:22px 0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;}
.sp-node{padding:14px 18px;background:#fffdf7;border:1px solid var(--border-light);
  border-radius:8px;text-align:center;font-size:15.5px;line-height:1.6;}
.sp-node.left{border-left:4px solid #b66;}
.sp-node.right{border-right:4px solid #6a6;}
.sp-mid{background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#fff!important;border-radius:10px;padding:18px 22px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  font-weight:700;text-align:center;}
.sp-mid h5{color:#fff!important;margin:0 0 6px;font-size:18.5px;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small,.sp-mid p,.sp-mid *{color:rgba(255,255,255,.92)!important;}

/* checklist */
.checklist{list-style:none;padding-left:8px;margin:14px 0;}
.checklist li{position:relative;padding-left:30px;margin-bottom:10px;font-size:20px;line-height:1.85;}
.checklist li::before{content:&quot;○&quot;;position:absolute;left:0;top:0;color:var(--gold);font-weight:700;font-size:22px;}

/* phase */
.phase-badge{display:inline-block;padding:5px 14px;background:var(--gold);color:#fff!important;
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;
  border-radius:14px;margin-right:10px;font-weight:600;}

/* domino */
.domino-chain{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:18px 0;
  padding:18px 20px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.domino{padding:12px 18px;background:#fef9ec;border:1.5px solid var(--accentL);
  border-radius:6px;font-size:17px;color:var(--accent);font-weight:600;}
.chain-arrow{color:var(--gold);font-weight:700;font-size:18px;}

/* refutation */
.refutation-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.ref-cell{padding:16px 20px;background:#fffdf7;border:1px solid var(--border);
  border-radius:8px;font-size:17.5px;line-height:1.75;position:relative;padding-left:42px;}
.ref-cell::before{content:&quot;✘&quot;;position:absolute;left:14px;top:14px;color:#b66;font-weight:700;font-size:22px;}

/* hr */
hr{border:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:30px 0;}

/* progress capsule */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:&quot;Noto Sans TC&quot;,sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;backdrop-filter:blur(6px);}
.rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}
.rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.rp-pct{font-size:13px;font-weight:600;min-width:40px;text-align:right;}

/* footer */
.site-footer{margin:60px -28px 0;padding:36px 28px 28px;
  background:linear-gradient(135deg,#2a2218,#1a1610);color:#d4c4a8;text-align:center;}
.site-footer p{font-size:15px;line-height:1.9;margin-bottom:8px;letter-spacing:2px;}
.site-footer .footer-title{color:var(--goldL);font-size:17px;font-weight:600;margin-bottom:10px;letter-spacing:4px;}

#backTop{position:fixed;right:24px;bottom:80px;width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:20px;cursor:pointer;
  box-shadow:0 4px 12px rgba(91,58,41,.3);opacity:0;transition:.3s;z-index:110;}
#backTop.show{opacity:1;}

/* responsive */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:.3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:flex;align-items:center;justify-content:center;}
  .main{margin-left:0;padding:0 14px 80px;}
  .site-hero{margin:0 -14px;padding:64px 24px 56px;}
  .hero-title{font-size:38px;letter-spacing:3px;}
  .ch-head{padding:32px 22px 26px;}
  .ch-name{font-size:26px;letter-spacing:2px;}
  .ch-body{padding:24px 18px;}
  .four-grid,.two-col,.three-col,.spectrum,.triangle-diagram,.refutation-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:18px;}
  .hero-title{font-size:32px;}
  h2{font-size:24px;}
  h3{font-size:20px;}
}

(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart','mousedown'].forEach(function(ev){
    document.addEventListener(ev,function(e){
      if(ev==='mousedown' &amp;&amp; e.button!==2) return;
      blk(e);
    },true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&amp;&amp;(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&amp;&amp;e.shiftKey&amp;&amp;(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
  setInterval(function(){
    if(window.getSelection) try{window.getSelection().removeAllRanges();}catch(e){}
  },300);
})();

(function(){
  if(!window.frameElement) return;
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&amp;&amp;a.tagName!=='A') a=a.parentElement;
    if(!a) return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#') return;
    e.preventDefault();
    e.stopPropagation();
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el) return;
    try{
      var rect=el.getBoundingClientRect();
      var fr=window.frameElement;
      var frRect=fr.getBoundingClientRect();
      var targetY=window.parent.scrollY+frRect.top+rect.top-60;
      window.parent.scrollTo({top:targetY,behavior:'smooth'});
    }catch(ex){}
  },true);
})();

(function(){
  var KEY = 'WeiYuanL5_2026';
  function dec(b64){
    try{
      var bin = atob(b64), out='';
      for(var i=0;i&lt;bin.length;i++) out += String.fromCharCode(bin.charCodeAt(i)^KEY.charCodeAt(i%KEY.length));
      return decodeURIComponent(escape(out));
    }catch(e){return'';}
  }
  function decodeAll(){
    var els = document.querySelectorAll('span.wy-c[data-c]');
    for(var i=0;i&lt;els.length;i++){
      var el = els[i];
      el.textContent = dec(el.getAttribute('data-c'));
      el.removeAttribute('data-c');
      el.classList.add('wy-decoded');
    }
  }
  function go(){
    try{
      if(window.parent &amp;&amp; window.parent.__wyReady &amp;&amp; typeof window.parent.__wyReady.then === 'function'){
        window.parent.__wyReady.then(decodeAll, function(){});
        return;
      }
    }catch(e){}
    decodeAll();
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', go);
  } else {
    go();
  }
})();

<script>
(function(){
  // active sidebar item
  var sbItems = document.querySelectorAll('.sb-item');
  var chapters = document.querySelectorAll('.chapter');
  var sb = document.getElementById('sb');
  var sbToggle = document.getElementById('sbToggle');
  var backTop = document.getElementById('backTop');
  var rpFill = document.getElementById('rpFill');
  var rpPct  = document.getElementById('rpPct');

  function updateActive(){
    var idx = -1;
    for(var i=0;i<chapters.length;i++){
      var top = chapters[i].getBoundingClientRect().top;
      if(top < window.innerHeight*0.35) idx = i;
    }
    sbItems.forEach(function(el,i){
      if(i===idx) el.classList.add('active');
      else el.classList.remove('active');
    });
  }
  function updateProgress(){
    var sh = document.documentElement.scrollHeight - window.innerHeight;
    var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
    if(rpFill) rpFill.style.width = pct + '%';
    if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
  }
  function updateBackTop(){
    if(window.scrollY > 600) backTop.classList.add('show');
    else backTop.classList.remove('show');
  }

  // sticky brand回頂
  var sbBrand = document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
  if(backTop){
    backTop.addEventListener('click',function(){
      window.scrollTo({top:0,behavior:'smooth'});
    });
  }
  if(sbToggle){
    sbToggle.addEventListener('click',function(){
      sb.classList.toggle('show');
    });
  }

  // iframe auto height
  function resizeFrame(f){
    try{
      var d = f.contentDocument || f.contentWindow.document;
      if(!d || !d.body) return;
      d.body.style.minHeight = '0';
      d.body.style.height    = 'auto';
      if(d.documentElement){
        d.documentElement.style.minHeight = '0';
        d.documentElement.style.height    = 'auto';
      }
      var h = d.body.scrollHeight;
      if(h > 100){
        f.style.height    = h + 'px';
        f.style.minHeight = '0';
      }
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    updateProgress();
  }
  function setupFrame(f){
    var tries = 0;
    function tick(){
      tries++;
      resizeFrame(f);
      if(tries < 30) setTimeout(tick, 200);
    }
    if(f.contentDocument && f.contentDocument.readyState === 'complete'){
      tick();
    } else {
      f.addEventListener('load', tick);
    }
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize', function(){
    clearTimeout(rzT);
    rzT = setTimeout(resizeAllFrames, 200);
  });

  // anchor click -> resize first then smooth scroll
  document.addEventListener('click', function(e){
    var a = e.target;
    while(a && a.tagName !== 'A') a = a.parentElement;
    if(!a) return;
    var h = a.getAttribute('href');
    if(!h || h.charAt(0) !== '#' || h.length < 2) return;
    var id = h.substring(1);
    var el = document.getElementById(id);
    if(!el) return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect = el.getBoundingClientRect();
      var y = window.scrollY + rect.top - 20;
      window.scrollTo({top:y, behavior:'smooth'});
    }, 60);
  }, true);

  // 持續輪詢
  var _rt=0, _riv=setInterval(function(){
    _rt++; resizeAllFrames();
    if(_rt > 50) clearInterval(_riv);
  }, 300);

  window.addEventListener('scroll', function(){
    updateActive();
    updateProgress();
    updateBackTop();
  }, {passive:true});
  updateActive();
  updateProgress();

  // 防複製
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-l5-decoder">
(function(){
  var KEY = 'WeiYuanL5_2026';
  function dec(b64){
    try{
      var bin = atob(b64), out='';
      for(var i=0;i<bin.length;i++) out += String.fromCharCode(bin.charCodeAt(i)^KEY.charCodeAt(i%KEY.length));
      return decodeURIComponent(escape(out));
    }catch(e){return'';}
  }
  function decodeAll(){
    var els = document.querySelectorAll('span.wy-c[data-c]');
    for(var i=0;i<els.length;i++){
      var el = els[i];
      el.textContent = dec(el.getAttribute('data-c'));
      el.removeAttribute('data-c');
      el.classList.add('wy-decoded');
    }
  }
  function go(){
    if(window.__wyReady && typeof window.__wyReady.then === 'function'){
      window.__wyReady.then(decodeAll, function(){});
    } else {
      // 沒有 __wyReady（理論上不會發生）→ 回退到 DOMContentLoaded
      if(document.readyState !== 'loading') decodeAll();
      else document.addEventListener('DOMContentLoaded', decodeAll);
    }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', go);
  } else {
    go();
  }
})();
</script>

<script id="wy-main-guard">
(function(){
  var ALLOWED_HOST = "weiwen0925.github.io";
  var ALLOWED_PATH = "/dazhidulun-77/";
  var DOC = document.documentElement;
  var _ready_resolve, _ready_reject;
  window.__wyReady = new Promise(function(res, rej){ _ready_resolve = res; _ready_reject = rej; });
  window.__wyOriginOK = false;

  // ── 靜默鎖定：無警告頁面，只把整頁變不可見（禁止文字空白）──
  function _silentLock(reason){
    try{
      DOC.classList.remove('wy-pending');
      DOC.classList.add('wy-locked');
      // 不替換 body.innerHTML、不顯示任何 lockdown 文字
      // 把所有 iframe 內容也清掉（避免一閃而過）
      var ifs = document.querySelectorAll('iframe');
      for (var i=0;i<ifs.length;i++){
        try{ ifs[i].srcdoc = ''; }catch(e){}
        try{ ifs[i].src = 'about:blank'; }catch(e){}
      }
    }catch(e){}
    try{ if(_ready_reject) _ready_reject(reason||'locked'); }catch(e){}
  }

  // ── B · webdriver / headless 偵測 ──
  try{
    var ua = (navigator.userAgent||'') + '';
    var bot = /HeadlessChrome|PhantomJS|Selenium|puppeteer|playwright|electron/i.test(ua);
    if (navigator.webdriver === true || bot){
      _silentLock('automation');
      return;
    }
  }catch(e){}

  // ── L4 · Origin Lock（同步檢查）──
  try{
    var host = location.hostname || '';
    var path = location.pathname || '';
    var hostOK = (host === ALLOWED_HOST);
    var pathOK = (path.indexOf(ALLOWED_PATH) === 0);
    if (!hostOK || !pathOK){
      _silentLock('origin');
      return;
    }
  }catch(e){
    _silentLock('origin-exception');
    return;
  }

  // ── L2 · 覆寫 window.print + 攔截快捷鍵 ──
  try{
    var _np = function(){};
    Object.defineProperty(window, 'print', { value: _np, writable: false, configurable: false });
  }catch(e){
    try{ window.print = function(){}; }catch(e2){}
  }
  document.addEventListener('keydown', function(e){
    var k = e.key;
    if ((e.metaKey||e.ctrlKey) && (k==='p'||k==='P'||k==='s'||k==='S'||k==='u'||k==='U')){
      e.preventDefault(); e.stopPropagation(); return false;
    }
    if (k==='F12'){ e.preventDefault(); return false; }
    if ((e.metaKey||e.ctrlKey) && e.shiftKey && (k==='I'||k==='J'||k==='C'||k==='K'||k==='P')){
      e.preventDefault(); return false;
    }
  }, true);

  // ── L6 · 線上活性驗證 ──
  function _liveCheck(){
    var url = location.protocol + '//' + ALLOWED_HOST + ALLOWED_PATH +
              '?_wyping=' + Date.now() + '.' + Math.random().toString(36).slice(2,8);
    var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
    var timer = setTimeout(function(){ if(ctrl) try{ctrl.abort();}catch(e){} }, 6000);
    return fetch(url, {
      method: 'HEAD',
      cache: 'no-store',
      mode: 'no-cors',
      credentials: 'omit',
      redirect: 'follow',
      signal: ctrl ? ctrl.signal : undefined
    }).then(function(){ clearTimeout(timer); return true; },
       function(){ clearTimeout(timer); return false; });
  }
  _liveCheck().then(function(ok){
    if (!ok){ _silentLock('liveness'); return; }
    window.__wyOriginOK = true;
    try{ DOC.classList.remove('wy-pending'); }catch(e){}
    try{ if(_ready_resolve) _ready_resolve(true); }catch(e){}
  });

  // 防止 DevTools 一鍵下載 / 右鍵
  ['contextmenu','copy','cut','dragstart','selectstart'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); return false; }, true);
  });
})();
</script>
